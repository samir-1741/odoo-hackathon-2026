<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E31837" />
      <stop offset="100%" stop-color="#990f23" />
    </linearGradient>
  </defs>

  <!-- Modern minimalist globe and flight path -->
  <g transform="translate(15, 25)">
    <!-- Globe outline -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="#111827" stroke-width="5" opacity="0.1"/>
    <!-- Latitude curve -->
    <path d="M 10 30 Q 50 60 90 30" fill="none" stroke="#111827" stroke-width="3" opacity="0.1"/>
    <!-- Longitude curve -->
    <path d="M 30 10 Q 70 50 30 90" fill="none" stroke="#111827" stroke-width="3" opacity="0.1"/>
    
    <!-- Bold Flight swoop -->
    <path d="M -10 60 C 20 120, 90 80, 110 10" fill="none" stroke="#E31837" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Modern Airplane Silhouette -->
    <path d="M 105 5 L 125 15 L 105 25 L 110 15 Z" fill="#E31837" transform="rotate(-30, 110, 15)"/>
  </g>

  <!-- High-end Corporate Typography -->
  <text x="145" y="95" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="76" font-weight="900" fill="#111827" letter-spacing="-3">
    nextrip<tspan fill="#E31837" font-size="76">.</tspan>
  </text>
  
  <!-- Sleek tagline -->
  <text x="150" y="122" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#6b7280" letter-spacing="12">
    PREMIUM TRAVEL
  </text>
</svg>
