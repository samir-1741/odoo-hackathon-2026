<div class="space-y-6 pb-10 relative">

  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h2 class="text-3xl font-black font-['Poppins'] tracking-tight text-gray-900">Destinations</h2>
      <p class="text-sm text-gray-500 mt-1">Manage holiday packages, locations, and their availability.</p>
    </div>
    
    <div class="flex items-center gap-3">
      <div class="relative hidden sm:block">
        <svg class="w-4 h-4 absolute left-4 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" placeholder="Search locations..." class="bg-white text-sm rounded-xl pl-10 pr-4 py-2.5 w-60 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-red-100 focus:border-red-400 transition-all shadow-sm">
      </div>
      
      <button (click)="openAddModal()" class="flex items-center gap-2 bg-red-600 text-white px-5 py-2.5 rounded-xl hover:bg-red-700 transition-colors font-semibold text-sm shadow-lg shadow-red-200">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Add Location
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <div *ngFor="let dest of destinations" class="bg-white rounded-3xl overflow-hidden shadow-md shadow-gray-200/40 border border-gray-100 hover:shadow-xl transition-all duration-300 group flex flex-col">
      
      <div class="relative h-48 overflow-hidden bg-gray-100">
        <img [src]="dest.image" [alt]="dest.name" (error)="handleImageError($event)" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        <div class="absolute top-4 left-4">
           <span class="px-2.5 py-1 text-[10px] font-black uppercase tracking-wider rounded-lg shadow-sm" [ngClass]="getStatusClass(dest.status)">{{ dest.status }}</span>
        </div>
        <div class="absolute bottom-4 right-4">
           <span class="bg-white/90 backdrop-blur-md text-gray-900 px-3 py-1.5 rounded-xl text-xs font-bold shadow-sm">From {{ dest.price }}</span>
        </div>
      </div>

      <div class="p-5 flex-1 flex flex-col">
        <div class="mb-2">
            <h3 class="font-['Poppins'] font-bold text-lg text-gray-900 group-hover:text-red-600 transition-colors leading-tight">{{ dest.name }}</h3>
            <p class="text-xs text-gray-500 font-medium mt-0.5 flex items-center gap-1">
              <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
              {{ dest.country }}
            </p>
        </div>

        <div class="mt-4 pt-4 border-t border-gray-100 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="bg-red-50 p-1.5 rounded-lg text-red-600">
               <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <div>
              <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none">Bookings</p>
              <p class="text-sm font-black text-gray-900 leading-none mt-1">{{ dest.bookings | number }}</p>
            </div>
          </div>
          <div class="flex items-center gap-1">
            <button class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Edit">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </button>
            <button (click)="deleteDestination(dest.id, dest.name)" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Delete">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="showAddModal" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm px-4">
    <div class="bg-white rounded-[32px] w-full max-w-md p-8 shadow-2xl relative">
      
      <button (click)="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 p-2 rounded-full hover:bg-gray-100 transition-all">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
      
      <h3 class="text-2xl font-black font-['Poppins'] text-gray-900 mb-1">Add Location</h3>
      <p class="text-sm text-gray-500 mb-6">Create a new premium holiday destination.</p>

      <div class="space-y-4">
        <div>
          <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Destination Name</label>
          <input type="text" [(ngModel)]="newDestination.name" placeholder="e.g. Kashmir" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-3 focus:ring-2 focus:ring-red-100 focus:border-red-400 outline-none transition-all">
        </div>

        <div>
          <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Country / Region</label>
          <input type="text" [(ngModel)]="newDestination.country" placeholder="e.g. India" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-3 focus:ring-2 focus:ring-red-100 focus:border-red-400 outline-none transition-all">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Starting Price</label>
              <input type="text" [(ngModel)]="newDestination.price" placeholder="e.g. 45000" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-3 focus:ring-2 focus:ring-red-100 focus:border-red-400 outline-none transition-all">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Status</label>
              <select [(ngModel)]="newDestination.status" class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-3 focus:ring-2 focus:ring-red-100 focus:border-red-400 outline-none transition-all cursor-pointer">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
        </div>

        <div>
          <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Image URL (Optional)</label>
          <input type="text" [(ngModel)]="newDestination.image" placeholder="Paste image link here..." class="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-3 focus:ring-2 focus:ring-red-100 focus:border-red-400 outline-none transition-all">
        </div>
      </div>

      <div class="mt-8 flex items-center justify-end gap-3">
        <button (click)="closeModal()" class="px-5 py-2.5 text-sm font-semibold text-gray-500 hover:text-gray-900 transition-colors hover:bg-gray-100 rounded-xl">Cancel</button>
        <button (click)="saveDestination()" class="px-6 py-2.5 bg-red-600 text-white rounded-xl font-bold shadow-lg shadow-red-200 hover:bg-red-700 transition-all">Add Destination</button>
      </div>

    </div>
  </div>

</div>
