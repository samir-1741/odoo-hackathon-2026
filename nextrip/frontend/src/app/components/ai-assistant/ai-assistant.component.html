<!-- Floating Action Button -->
<button 
  *ngIf="!isOpen" 
  (click)="toggleChat()" 
  class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-red-600 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 hover:bg-red-700 transition-all group overflow-hidden border-4 border-white">
  <span class="material-icons text-white text-3xl z-10 group-hover:rotate-12 transition-transform">smart_toy</span>
  <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 transition-opacity"></div>
</button>

<!-- Chat Window -->
<div 
  *ngIf="isOpen" 
  [class.translate-y-0]="!isMinimized"
  [class.opacity-100]="!isMinimized"
  [class.translate-y-full]="isMinimized"
  [class.opacity-0]="isMinimized"
  [class.mb-16]="isMinimized"
  class="fixed bottom-6 right-6 z-50 w-full max-w-[380px] h-[600px] max-h-[80vh] bg-white rounded-[28px] shadow-2xl flex flex-col overflow-hidden border border-red-100 transition-all duration-500 ease-[cubic-bezier(0.23,1,0.32,1)] origin-bottom-right">
  
  <!-- Header -->
  <div class="bg-red-600 px-6 py-4 flex items-center justify-between shadow-md cursor-pointer" (click)="minimizeChat($event)">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-inner">
        <span class="material-icons text-red-600">auto_awesome</span>
      </div>
      <div>
        <h3 class="text-white font-bold text-lg leading-tight tracking-wide">Nextrip AI</h3>
        <p class="text-red-100 text-xs font-medium uppercase tracking-widest">Travel Assistant</p>
      </div>
    </div>
    <div class="flex items-center gap-1">
      <button class="w-8 h-8 flex items-center justify-center text-white hover:bg-white/20 rounded-full transition-colors" (click)="minimizeChat($event)">
        <span class="material-icons text-sm">remove</span>
      </button>
      <button class="w-8 h-8 flex items-center justify-center text-white hover:bg-white/20 rounded-full transition-colors" (click)="closeChat($event)">
        <span class="material-icons text-sm">close</span>
      </button>
    </div>
  </div>

  <!-- Minimized Bar Overlay (Only visible when minimized) -->
  <div *ngIf="isMinimized" 
       class="absolute top-0 left-0 w-full h-full bg-red-600 flex items-center justify-between px-6 cursor-pointer hover:bg-red-700 transition-colors z-50"
       (click)="toggleChat()">
    <div class="flex items-center gap-3">
      <span class="material-icons text-white">smart_toy</span>
      <span class="text-white font-bold">Chat with Nextrip AI</span>
    </div>
    <span class="material-icons text-white">expand_less</span>
  </div>

  <!-- Messages Area -->
  <div #scrollMe class="flex-1 overflow-y-auto p-6 space-y-5 bg-gray-50/50">
    <div *ngFor="let msg of messages" class="flex" [ngClass]="msg.role === 'user' ? 'justify-end' : 'justify-start'">
      
      <!-- AI Avatar -->
      <div *ngIf="msg.role === 'assistant'" class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0 mr-3 self-end shadow-sm border border-red-200">
        <span class="material-icons text-red-600 text-sm">smart_toy</span>
      </div>

      <!-- Message Bubble -->
      <div 
        class="max-w-[80%] px-4 py-3 shadow-sm"
        [ngClass]="msg.role === 'user' ? 
          'bg-red-600 text-white rounded-2xl rounded-br-sm' : 
          'bg-white text-gray-800 rounded-2xl rounded-bl-sm border border-gray-100'">
        <p class="text-sm font-medium leading-relaxed whitespace-pre-wrap">{{msg.content}}</p>
      </div>
      
    </div>

    <!-- Loading Indicator -->
    <div *ngIf="isLoading" class="flex justify-start">
      <div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0 mr-3 self-end shadow-sm border border-red-200">
        <span class="material-icons text-red-600 text-sm">smart_toy</span>
      </div>
      <div class="bg-white border border-gray-100 px-4 py-3 rounded-2xl rounded-bl-sm shadow-sm flex items-center gap-1.5">
        <div class="w-2 h-2 bg-red-400 rounded-full animate-bounce"></div>
        <div class="w-2 h-2 bg-red-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
        <div class="w-2 h-2 bg-red-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="p-4 bg-white border-t border-gray-100">
    <div class="relative flex items-center">
      <input 
        type="text" 
        [(ngModel)]="userInput" 
        (keyup.enter)="sendMessage()"
        placeholder="Ask me about a destination..." 
        class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-full py-3 pl-5 pr-14 outline-none focus:border-red-500 focus:bg-white focus:ring-2 focus:ring-red-100 transition-all font-medium placeholder-gray-400"
        [disabled]="isLoading">
      <button 
        (click)="sendMessage()" 
        [disabled]="!userInput.trim() || isLoading"
        class="absolute right-2 w-9 h-9 flex items-center justify-center rounded-full bg-red-600 text-white disabled:bg-red-300 disabled:cursor-not-allowed hover:bg-red-700 transition-colors shadow-sm">
        <span class="material-icons text-[18px] ml-1">send</span>
      </button>
    </div>
    <div class="text-center mt-2">
      <span class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">Powered by OpenRouter AI</span>
    </div>
  </div>

</div>
