<div class="space-y-8 pb-10">

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
    <div *ngFor="let stat of statCards" class="bg-white rounded-3xl p-6 shadow-md shadow-gray-200/40 border border-gray-100 hover:shadow-xl transition-all group">
      <div class="flex justify-between items-start mb-4">
        <h3 class="text-[10px] uppercase tracking-widest font-bold text-gray-400">{{ stat.title }}</h3>
        <div class="bg-red-50 text-red-600 rounded-full p-2.5 group-hover:scale-110 transition-transform">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
          </svg>
        </div>
      </div>
      <div>
        <h2 class="text-3xl font-black font-['Poppins'] tracking-tight text-gray-900 mb-1">{{ stat.value }}</h2>
        <p class="text-xs font-medium flex items-center" [ngClass]="stat.isPositive ? 'text-green-600' : 'text-red-500'">
          {{ stat.trend }}
        </p>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    
    <div class="bg-white rounded-3xl p-8 shadow-md shadow-gray-200/40 border border-gray-100 xl:col-span-2 flex flex-col">
      <h3 class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-6">User Growth (Last 6 Months)</h3>
      
      <div class="flex-1 w-full flex flex-col justify-end pt-4 relative">
        <svg viewBox="0 0 600 160" class="w-full h-full overflow-visible drop-shadow-sm">
           <defs>
             <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
               <stop offset="0%" stop-color="#dc2626" stop-opacity="0.15"/>
               <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
             </linearGradient>
           </defs>
           
           <path [attr.d]="lineChartPath + ' L 600,150 L 0,150 Z'" fill="url(#lineGrad)" />
           
           <path [attr.d]="lineChartPath" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-md"/>

           <g *ngFor="let pt of getChartPoints()" class="group cursor-pointer">
              <text [attr.x]="pt.x" [attr.y]="pt.y - 15" text-anchor="middle" fill="#111827" font-size="12" font-weight="bold" class="opacity-0 group-hover:opacity-100 transition-opacity">{{ pt.value | number }}</text>
              <circle [attr.cx]="pt.x" [attr.cy]="pt.y" r="5" fill="white" stroke="#dc2626" stroke-width="3" class="transition-all duration-300 group-hover:stroke-[4px]"/>
           </g>
        </svg>

        <div class="flex justify-between w-full mt-4 border-t border-gray-100 pt-3">
           <span *ngFor="let data of lineChartData" class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">{{ data.month }}</span>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-3xl p-8 shadow-md shadow-gray-200/40 border border-gray-100 flex flex-col">
      <h3 class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-6">Trip Distribution</h3>
      
      <div class="flex-1 flex flex-col items-center justify-center w-full">
         
         <div class="relative w-48 h-48 rounded-full shadow-inner flex items-center justify-center transition-transform hover:scale-105 duration-500" [style.background]="doughnutGradient">
            <div class="w-32 h-32 bg-white rounded-full shadow-sm flex flex-col items-center justify-center z-10">
               <span class="text-3xl font-black text-gray-900 font-['Poppins']">3.8k</span>
               <span class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mt-1">Total Trips</span>
            </div>
         </div>
         
         <div class="mt-8 w-full flex flex-col gap-4">
            <div *ngFor="let item of doughnutLegend" class="flex items-center justify-between">
               <div class="flex items-center gap-3">
                  <span class="w-3 h-3 rounded-full shadow-sm" [ngClass]="item.color"></span>
                  <span class="text-sm font-semibold text-gray-700">{{ item.label }}</span>
               </div>
               <span class="text-sm font-bold text-gray-900">{{ item.percent }}</span>
            </div>
         </div>

      </div>
    </div>
  </div>

  <div class="bg-white rounded-3xl p-8 shadow-md shadow-gray-200/40 border border-gray-100 mt-6">
    <h3 class="font-['Poppins'] font-bold text-lg text-gray-900 mb-6">Recent Activity</h3>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse min-w-[800px]">
        <thead>
          <tr>
            <th class="uppercase tracking-widest text-[10px] font-bold text-gray-400 pb-4 border-b border-gray-100 w-1/3">User</th>
            <th class="uppercase tracking-widest text-[10px] font-bold text-gray-400 pb-4 border-b border-gray-100 w-1/3">Action</th>
            <th class="uppercase tracking-widest text-[10px] font-bold text-gray-400 pb-4 border-b border-gray-100">Date</th>
            <th class="uppercase tracking-widest text-[10px] font-bold text-gray-400 pb-4 border-b border-gray-100 text-right">Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let activity of recentActivities" class="hover:bg-gray-50/50 transition-colors group">
            <td class="py-4 border-b border-gray-50">
              <div class="flex items-center gap-3">
                <img [src]="activity.avatar" alt="Avatar" class="w-9 h-9 rounded-full object-cover shadow-sm">
                <span class="text-sm font-semibold text-gray-900 group-hover:text-red-600 transition-colors">{{ activity.name }}</span>
              </div>
            </td>
            <td class="py-4 border-b border-gray-50 text-sm font-medium text-gray-600">{{ activity.action }}</td>
            <td class="py-4 border-b border-gray-50 text-sm font-medium text-gray-500">{{ activity.date }}</td>
            <td class="py-4 border-b border-gray-50 text-right">
              <span class="px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-full inline-block border" [ngClass]="getStatusClass(activity.status)">
                {{ activity.status }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
