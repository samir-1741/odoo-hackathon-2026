<div class="min-h-screen bg-gray-50 flex font-['Inter'] text-gray-900 overflow-hidden">
  
  <aside 
    [ngClass]="isSidebarCollapsed ? 'w-[88px]' : 'w-[280px]'"
    class="bg-white border-r border-gray-100 h-screen fixed top-0 left-0 flex flex-col shadow-sm z-20 transition-all duration-300 ease-in-out">
    
    <div class="h-20 flex items-center justify-center px-4 border-b border-gray-50">
      <div class="flex items-center overflow-hidden whitespace-nowrap" [ngClass]="isSidebarCollapsed ? 'justify-center w-full' : 'gap-3 w-full pl-4'">
        <img src="/logo.png" alt="Nextrip" class="h-10 w-auto shrink-0 transition-transform duration-300">
        <div [ngClass]="isSidebarCollapsed ? 'opacity-0 w-0 hidden' : 'opacity-100 w-auto flex flex-col justify-center transition-all duration-300'">
            <span class="text-2xl font-black tracking-tighter text-gray-900 font-['Poppins'] leading-none">
                Nex<span class="text-red-600">trip</span>
            </span>
            <span class="text-[9px] uppercase tracking-[0.3em] text-gray-500 font-bold leading-none mt-1">Premium Holidays</span>
        </div>
      </div>
    </div>

    <nav class="flex-1 py-6 px-4 space-y-2 overflow-y-auto overflow-x-hidden">
      <ng-container *ngFor="let item of menuItems">
        <a [routerLink]="item.route" 
           class="flex items-center px-3 py-3 rounded-xl transition-all font-medium relative group cursor-pointer"
           [ngClass]="isActive(item.route) ? 'bg-red-600 text-white shadow-md shadow-red-200' : 'text-gray-500 hover:bg-red-50 hover:text-red-600'">
          
          <span class="flex items-center justify-center w-6 h-6 shrink-0 transition-colors" [ngClass]="isActive(item.route) ? 'text-white' : 'text-gray-400 group-hover:text-red-600'" [ngSwitch]="item.name">
             
             <svg *ngSwitchCase="'Dashboard'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" /></svg>
             <svg *ngSwitchCase="'User Management'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" /></svg>
             <svg *ngSwitchCase="'Trip Analytics'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" /></svg>
             <svg *ngSwitchCase="'Destinations'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
             <svg *ngSwitchCase="'Financials'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
             <svg *ngSwitchCase="'Settings'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          </span>

          <span 
            [ngClass]="isSidebarCollapsed ? 'opacity-0 w-0 ml-0 hidden' : 'opacity-100 w-auto ml-4 block'"
            class="whitespace-nowrap transition-all duration-300">
            {{ item.name }}
          </span>

        </a>
      </ng-container>
    </nav>
  </aside>

  <main 
    [ngClass]="isSidebarCollapsed ? 'ml-[88px]' : 'ml-[280px]'"
    class="flex-1 flex flex-col min-h-screen transition-all duration-300 ease-in-out w-full">
    
    <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-10 flex items-center justify-between px-8">
      
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()" class="p-2 -ml-2 rounded-xl text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path *ngIf="!isSidebarCollapsed" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            <path *ngIf="isSidebarCollapsed" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16"/>
          </svg>
        </button>
      </div>
      
      <div class="flex items-center gap-6">
        <div class="relative hidden md:block">
          <svg class="w-4 h-4 absolute left-4 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input type="text" placeholder="Search trips, users..." class="bg-gray-100 text-sm rounded-full pl-10 pr-4 py-2.5 w-64 focus:outline-none focus:ring-2 focus:ring-red-100 focus:bg-white transition-all">
        </div>

        <button class="relative p-2 text-gray-400 hover:text-gray-600 transition-colors">
          <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-600 rounded-full border-2 border-white"></span>
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        </button>

        <div class="flex items-center gap-3 pl-6 border-l border-gray-200 cursor-pointer hover:opacity-80 transition-opacity">
          <img src="https://i.pravatar.cc/150?img=11" alt="Admin" class="w-10 h-10 rounded-full object-cover shadow-sm border border-gray-100">
          <div class="hidden lg:block">
            <p class="text-sm font-bold text-gray-900 leading-none">Admin User</p>
            <p class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mt-1 leading-none">Super Admin</p>
          </div>
        </div>
      </div>
    </header>

    <div class="p-8">
       <router-outlet></router-outlet>
    </div>

  </main>
</div>
