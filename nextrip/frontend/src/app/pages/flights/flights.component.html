<div class="min-h-screen bg-gray-50 pt-10 pb-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <!-- Search Summary Header -->
    <div class="bg-white rounded-[32px] p-8 shadow-lg mb-8 flex flex-col md:flex-row justify-between items-center border border-gray-100">
      <div class="flex items-center space-x-6 mb-6 md:mb-0">
        <div class="text-left">
          <span class="text-[10px] uppercase font-black text-red-500 tracking-widest block mb-1">From</span>
          <div class="text-xl font-black text-gray-900">Mumbai (BOM)</div>
        </div>
        <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center text-red-600">
          <span class="material-icons">sync</span>
        </div>
        <div class="text-left">
          <span class="text-[10px] uppercase font-black text-red-500 tracking-widest block mb-1">To</span>
          <div class="text-xl font-black text-gray-900">Delhi (DEL)</div>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <div class="bg-gray-100 px-6 py-3 rounded-2xl text-center">
          <span class="text-[10px] uppercase font-black text-gray-400 tracking-widest block mb-1">Date</span>
          <div class="text-sm font-bold text-gray-900">24 May, 2026</div>
        </div>
        <button class="bg-red-600 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest">Modify</button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
      <!-- Filters Sidebar -->
      <div class="lg:col-span-1 space-y-6">
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-100">
          <h3 class="text-sm font-black text-gray-900 uppercase tracking-widest mb-8">Filters</h3>
          <div class="mb-8">
            <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Max Price</h4>
            <input type="range" [(ngModel)]="priceRange" min="3000" max="10000" step="500" class="w-full accent-red-500">
            <div class="flex justify-between mt-2 text-xs font-bold text-gray-900">₹3,000 <span>₹{{priceRange}}</span></div>
          </div>
        </div>
      </div>

      <!-- Flight Results -->
      <div class="lg:col-span-3 space-y-4">
        <div *ngFor="let flight of filteredFlights" class="bg-white rounded-[32px] p-8 border border-gray-100 shadow-sm group hover:shadow-xl transition-all duration-500 flex flex-col md:flex-row items-center justify-between">
          <div class="flex items-center space-x-6 mb-6 md:mb-0">
            <div class="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center text-3xl">{{flight.logo}}</div>
            <div>
              <div class="text-xl font-black text-gray-900">{{flight.airline}}</div>
              <div class="text-[10px] text-gray-400 font-black tracking-widest uppercase">{{flight.code}} · {{flight.class}}</div>
            </div>
          </div>

          <div class="flex items-center space-x-8 text-center">
            <div>
              <div class="text-xl font-black text-gray-900">{{flight.departure}}</div>
              <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">BOM</div>
            </div>
            <div class="flex flex-col items-center">
               <span class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">{{flight.duration}}</span>
               <div class="w-32 h-px bg-red-100 relative">
                 <div class="absolute -top-1 -left-1 w-2 h-2 rounded-full border-2 border-red-500 bg-white"></div>
                 <div class="absolute -top-1 -right-1 w-2 h-2 rounded-full border-2 border-red-500 bg-white"></div>
               </div>
               <span class="text-[9px] font-bold text-gray-400 mt-1 uppercase">{{flight.type}}</span>
            </div>
            <div>
              <div class="text-xl font-black text-gray-900">{{flight.arrival}}</div>
              <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">DEL</div>
            </div>
          </div>

          <div class="text-right mt-6 md:mt-0">
            <div class="text-3xl font-black text-gray-900 tracking-tighter">₹{{flight.price}}</div>
            <button (click)="bookFlight(flight)" [disabled]="isBooking" class="mt-4 bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-2xl font-black tracking-widest text-[10px] shadow-xl shadow-red-200 transition-all hover:scale-105 flex items-center justify-center">
               <span *ngIf="isBooking" class="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2"></span>
               {{ isBooking ? 'BOOKING...' : 'BOOK NOW' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
